name: README Surface Sync

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

concurrency:
  group: readme-surface-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync:
    name: Validate and regenerate README surface
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        shell: bash
        run: |
          set -euo pipefail

          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          fi

      - name: Preflight validation
        shell: bash
        run: |
          set -euo pipefail
          make validate

      - name: Generate README surface
        shell: bash
        run: |
          set -euo pipefail
          make build

      - name: Show generated diff
        shell: bash
        run: |
          set -euo pipefail

          git status --short
          git diff -- README.md README.base.md assets dist health metrics | sed -n '1,220p' || true

      - name: Commit generated surface changes
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            README.md \
            README.base.md \
            assets/flow-line.svg \
            assets/section_quote.svg \
            assets/system-health.svg \
            assets/repo-metrics.svg \
            dist/build-manifest.json \
            health/system_health.json \
            metrics/aggregate.json \
            metrics/metrics.json \
            metrics/popdeuxrem_popdeuxrem.json

          if git diff --cached --quiet; then
            echo "No generated surface changes to commit."
            exit 0
          fi

          git commit -m "chore: sync deterministic README surface"
          git push
