name: Render animated terminal shells

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - "assets/terminal/*.tape"
      - "scripts/render_animated_shells.sh"

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install vhs
        run: |
          curl -fsSL https://github.com/charmbracelet/vhs/releases/latest/download/vhs_Linux_x86_64.tar.gz -o vhs.tar.gz
          sudo tar -xzf vhs.tar.gz -C /usr/local/bin vhs
          vhs --version

      - name: Render animated shells
        run: |
          chmod +x scripts/render_animated_shells.sh
          scripts/render_animated_shells.sh

      - name: Commit updated terminal assets (if any)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git status --porcelain | grep "assets/terminal/quantum-shell-animated.gif\|assets/terminal/quantum-basilica-shell-animated.gif"; then
            git add assets/terminal/quantum-shell-animated.gif assets/terminal/quantum-basilica-shell-animated.gif
            git commit -m "chore: render animated terminal shells"
            git push
          else
            echo "No terminal shell assets changed; skipping commit."
