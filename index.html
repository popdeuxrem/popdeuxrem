<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>◆ Deployed Systems | Lysergic Infrastructure</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      font-family: 'JetBrains Mono', monospace;
      color: #999;
      min-height: 100vh;
      padding: 3rem 1rem;
    }
    #deployed-systems {
      max-width: 900px;
      margin: 0 auto;
    }
    .sys-header {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    .sys-header h2 {
      letter-spacing: 0.35em;
      color: #fff;
      font-size: 1.1rem;
      font-weight: normal;
    }
    .sys-header p {
      color: #666;
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      margin-top: 0.5rem;
    }
    .sys-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 1.25rem;
    }
    .sys-card {
      background: #0d0d0f;
      border: 1px solid #1f1f2e;
      border-radius: 6px;
      padding: 1.5rem;
      opacity: 0;
      transform: translateY(24px);
      animation: fadeUp 0.6s ease forwards;
      transition: 0.3s ease;
      text-decoration: none;
      display: block;
    }
    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }
    .sys-card:hover {
      transform: translateY(-3px);
      border-color: var(--accent);
      box-shadow: 0 0 20px -6px var(--accent);
    }
    .sys-card-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 0.5rem;
    }
    .sys-name {
      color: var(--accent);
      font-weight: 700;
    }
    .sys-domain {
      color: #444;
      font-size: 0.65rem;
      text-transform: uppercase;
    }
    .sys-desc {
      color: #888;
      font-size: 0.72rem;
      line-height: 1.6;
      margin: 0.75rem 0;
    }
    .sys-footer {
      display: flex;
      justify-content: space-between;
      border-top: 1px solid #1a1a2a;
      padding-top: 0.75rem;
      font-size: 0.75rem;
    }
    .sys-stars { color: #555; }
    .sys-link {
      color: var(--accent);
      text-decoration: none;
    }
    .status-SHIP { color: #00ff64; }
    .status-BUILD { color: #ffa000; }
    .status-DESIGN { color: #b44fff; }
  </style>
</head>
<body>
  <!-- DEPLOYED SYSTEMS -->
  <section id="deployed-systems">
    <div class="sys-header">
      <h2>◆ Deployed Systems</h2>
      <p>Operational repositories and active build pipelines</p>
    </div>
    <div class="sys-grid" id="sys-grid"></div>
  </section>

  <script>
    (async function () {
      const projects = await fetch('./data/projects.json')
        .then(r => r.json());
      const grid = document.getElementById('sys-grid');
      projects.forEach((p, i) => {
        const card = document.createElement('a');
        card.className = 'sys-card';
        card.href = p.repo;
        card.target = '_blank';
        const accent =
          p.id === 'popdeuxrem' ? '#b44fff' :
          p.id === 'shadow-scripts' ? '#00ffe0' :
          '#ff3cac';
        card.style.setProperty('--accent', accent);
        card.style.animationDelay = `${i * 0.12}s`;
        card.innerHTML = `
          <div class="sys-card-header">
            <span class="sys-name">${p.name}</span>
            <span class="status-${p.status}">${p.status}</span>
          </div>
          <div class="sys-domain">${p.domain}</div>
          <p class="sys-desc">${p.description}</p>
          <div class="sys-footer">
            <span class="sys-stars">★ ${p.stars}</span>
            <a href="${p.repo}" class="sys-link">Repository →</a>
          </div>
        `;
        grid.appendChild(card);
      });
    })();
  </script>
</body>
</html>
